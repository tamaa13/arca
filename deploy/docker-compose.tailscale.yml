# Arca — rootless deploy, PERMANENT URL via Tailscale Funnel, CI/CD via GHCR + Watchtower (pull-based).
#   TS_AUTHKEY=tskey-auth-... docker compose -f deploy/docker-compose.tailscale.yml up -d
# - arca: pulled from GHCR (CI builds it; the VPS never builds). No published host port.
# - tailscale: userspace (rootless), shares arca's netns, Funnel → https://arca.<tailnet>.ts.net.
# - watchtower: polls GHCR; when CI pushes a new arca image it pulls + recreates arca (+ restarts the
#   tailscale sidecar via depends-on). label-scoped → only touches OUR containers (never Chris's).
services:
  arca:
    image: ghcr.io/tamaa13/arca:latest
    container_name: arca
    restart: unless-stopped
    env_file:
      - ./testnet.env
    environment:
      - ARCA_PORT=8080
      - ARCA_HOST=0.0.0.0
    expose:
      - "8080"
    mem_limit: 512m
    cpus: 1.0
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks: [arcanet]
  tailscale:
    image: tailscale/tailscale:latest
    container_name: arca-ts
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}      # only needed on first join; node persists via state volume
      - TS_HOSTNAME=arca               # → https://arca.<your-tailnet>.ts.net
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/funnel.json
    volumes:
      - ./tailscale-funnel.json:/config/funnel.json:ro
      - arca-ts-state:/var/lib/tailscale
    depends_on: [arca]
    mem_limit: 128m
    cpus: 0.5
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - com.centurylinklabs.watchtower.depends-on=arca   # re-link netns after arca is recreated
    network_mode: "service:arca"        # share arca's netns → funnel proxies 127.0.0.1:8080
  watchtower:
    image: containrrr/watchtower:latest
    container_name: arca-watchtower
    restart: unless-stopped
    command: --interval 120 --cleanup --label-enable
    volumes:
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock   # rootless docker socket
    mem_limit: 96m
    cpus: 0.3
networks:
  arcanet:
    driver: bridge
volumes:
  arca-ts-state:
